id = "yersonargotev.tabby"
name = "Tabby"
version = "0.1.2"
min_herdr_version = "0.7.0"
description = "Homebrew-installed Herdr plugin for automatic tab labels."
platforms = ["macos"]

# Release flow:
#   brew install yersonargotev/tap/tabby
#   tabby install
# Homebrew installs this manifest under pkgshare (share/tabby) and the binary under bin.
# Keep the command path relative to this manifest so Herdr invokes the binary installed
# by the same Homebrew package, not target/debug/tabby or an ambiguous PATH lookup.

[[actions]]
id = "start"
title = "Start Tabby daemon"
contexts = ["workspace"]
command = ["../../bin/tabby", "start"]

[[actions]]
id = "unlock-focused"
title = "Unlock focused tab"
contexts = ["tab"]
command = ["../../bin/tabby", "unlock-focused"]

[[actions]]
id = "unlock-all"
title = "Unlock all tabs"
contexts = ["workspace"]
command = ["../../bin/tabby", "unlock-all"]
